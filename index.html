<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktivasi Kencleng Koin Surga</title>
</head>
<body>
    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0ea5e9,#10b981);
}

.container{
    width:90%;
    max-width:450px;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.logos{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    margin-bottom:20px;
}

.logos img{
    width:120px;
    max-height:90px;
    object-fit:contain;
}

h2{
    text-align:center;
    color:#0f172a;
    margin-bottom:5px;
}

.subjudul{
    text-align:center;
    color:#64748b;
    margin-bottom:25px;
    font-size:14px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
    color:#334155;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    margin-bottom:15px;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#10b981;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#10b981;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#059669;
}

.footer{
    text-align:center;
    margin-top:15px;
    font-size:12px;
    color:#64748b;
}

#pesan{
    text-align:center;
    margin-top:15px;
    font-weight:bold;
    color:green;
}
</style>

</head>

<body>

<div class="container">

   <div class="logos">
    <img src="logo-yayasan.png" alt="Logo Yayasan">
    <img src="logo-izi.png" alt="Logo IZI">
</div>

    <h2>Aktivasi Kencleng Koin Surga</h2>

    <p class="subjudul">
        Silakan isi data di bawah ini untuk mengaktifkan Kencleng Koin Surga.
    </p>

    <form id="formKencleng">

        <label>Nomor Kencleng</label>

        <input
        type="text"
        id="kencleng"
        class="readonly"
        readonly>

        <label>Nama Lengkap</label>

        <input
        type="text"
        id="nama"
        placeholder="Masukkan nama lengkap"
        required>

        <label>Nomor WhatsApp</label>
        
        <input
        type="tel"
        id="wa"
        placeholder="08xxxxxxxxxx"
        required>

        <label>Lokasi</label>

        <button
        type="button"
        class="btnLokasi"
        onclick="ambilLokasi()">

        📍 Ambil Lokasi Saya

        </button>

        <input
        type="text"
        id="alamat"
        class="readonly"
        placeholder="Lokasi belum diambil"
        readonly>

        <input type="hidden" id="latitude">

        <input type="hidden" id="longitude">

        <div class="loading" id="loading">

        Mengambil lokasi...

        </div>

        <button
        type="submit"
        class="btnAktivasi">

        AKTIVASI KENCLENG

        </button>

        </form>

        <div id="pesan"></div>

        <div class="footer">

        <b>UNIT LAYANAN ZAKAT IZI MAGETAN</b>

        <br>

        Memudahkan • Dimudahkan

        </div>

        </div>

<script>

//=============================
// URL Apps Script
//=============================

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw_6eni4lZOUHhDisHWOjjnJsXsHKQ-aL55zVEPmWONPpEhsmiIaD3X9Na7HMkuGghEqg/exec";


//=============================
// Ambil Nomor Kencleng dari QR
//=============================

const params = new URLSearchParams(window.location.search);

const id = params.get("id");

if(id){

document.getElementById("kencleng").value=id;

}


//=============================
// Ambil Lokasi GPS
//=============================

async function ambilLokasi(){

return new Promise((resolve,reject)=>{

    if(!navigator.geolocation){

        alert("Browser tidak mendukung GPS");

        reject();

        return;

    }

    document.getElementById("loading").style.display="block";
    document.getElementById("alamat").value="Mengambil lokasi...";

    navigator.geolocation.getCurrentPosition(async function(pos){

        const lat=pos.coords.latitude;
        const lon=pos.coords.longitude;

        document.getElementById("latitude").value=lat;
        document.getElementById("longitude").value=lon;

        try{

            const url=`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`;

            const res=await fetch(url);

            const json=await res.json();

            // Alamat lengkap
            document.getElementById("alamat").value=json.display_name;

        }catch(e){

            document.getElementById("alamat").value=lat+", "+lon;

        }

        document.getElementById("loading").style.display="none";

        resolve();

    },

    function(){

        alert("Lokasi tidak diizinkan.");

        document.getElementById("loading").style.display="none";

        reject();

    });

});

}


//=============================
// Submit Aktivasi
//=============================

document.getElementById("formKencleng")

.addEventListener("submit",function(e){

e.preventDefault();

let wa=document.getElementById("wa").value.trim();

if(!wa.startsWith("08")){

alert("Nomor WhatsApp harus diawali 08");

return;

}

const data={

kencleng:document.getElementById("kencleng").value,

nama:document.getElementById("nama").value,

wa:wa,

latitude:document.getElementById("latitude").value,

longitude:document.getElementById("longitude").value,

alamat:document.getElementById("alamat").value,

browser:navigator.userAgent,

device:navigator.platform

};


document.querySelector(".btnAktivasi").disabled=true;

document.querySelector(".btnAktivasi").innerHTML="Mengirim...";


fetch(SCRIPT_URL,{

method:"POST",

body:JSON.stringify(data)

})

.then(res=>res.text())

.then(result=>{

if(result=="BERHASIL"){

document.getElementById("pesan").innerHTML=

"✅ Aktivasi berhasil. Terima kasih.";

document.getElementById("pesan").style.color="green";

document.getElementById("formKencleng").reset();

}

else if(result=="SUDAH_AKTIF"){

document.getElementById("pesan").innerHTML=

"⚠️ Kencleng sudah pernah diaktivasi.";

document.getElementById("pesan").style.color="orange";

}

else{

document.getElementById("pesan").innerHTML=

"❌ Nomor Kencleng tidak ditemukan.";

document.getElementById("pesan").style.color="red";

}

document.querySelector(".btnAktivasi").disabled=false;

document.querySelector(".btnAktivasi").innerHTML="AKTIVASI KENCLENG";

})

.catch(()=>{

document.getElementById("pesan").innerHTML=

"❌ Gagal terhubung ke server.";

document.getElementById("pesan").style.color="red";

document.querySelector(".btnAktivasi").disabled=false;

document.querySelector(".btnAktivasi").innerHTML="AKTIVASI KENCLENG";

});

});

</script>

</body>
</html>
