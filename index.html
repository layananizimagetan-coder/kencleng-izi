<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktivasi Kencleng Koin Surga</title>
</head>
<body>
    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0ea5e9,#10b981);
}

.container{
    width:90%;
    max-width:450px;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.logos{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    margin-bottom:20px;
}

.logos img{
    width:120px;
    max-height:90px;
    object-fit:contain;
}

h2{
    text-align:center;
    color:#0f172a;
    margin-bottom:5px;
}

.subjudul{
    text-align:center;
    color:#64748b;
    margin-bottom:25px;
    font-size:14px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
    color:#334155;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    margin-bottom:15px;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#10b981;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#10b981;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#059669;
}

.footer{
    text-align:center;
    margin-top:15px;
    font-size:12px;
    color:#64748b;
}

#pesan{
    text-align:center;
    margin-top:15px;
    font-weight:bold;
    color:green;
}
</style>

</head>

<body>

<div class="container">

   <div class="logos">
    <img src="logo-yayasan.png" alt="Logo Yayasan">
    <img src="logo-izi.png" alt="Logo IZI">
</div>

    <h2>Aktivasi Kencleng Koin Surga</h2>

    <p class="subjudul">
        Silakan isi data di bawah ini untuk mengaktifkan Kencleng Koin Surga.
    </p>

    <form id="formKencleng">

        <label>Nomor Kencleng</label>
        <input type="text" id="kencleng" readonly>

        <label>Nama Lengkap</label>
        <input type="text" id="nama" placeholder="Masukkan nama lengkap" required>

        <label>Nomor WhatsApp</label>
        <input type="text" id="wa" placeholder="08xxxxxxxxxx" required>

        <label>Lokasi</label>

        <button type="button" onclick="ambilLokasi()">
            📍 Ambil Lokasi
        </button>
        
        <input type="text" id="alamat" readonly placeholder="Mengambil lokasi...">
        
        <input type="hidden" id="latitude">
        <input type="hidden" id="longitude">

        <button type="submit">
            Aktivasi Kencleng
        </button>

    </form>

    <div id="pesan"></div>

    <div class="footer">
        UNIT LAYANAN ZAKAT - IZI MAGETAN<br>
    <small>Memudahkan, Dimudahkan</small>
    </div>

</div>

<script>


// Ambil nomor kencleng dari QR
const urlParams = new URLSearchParams(window.location.search);
const idKencleng = urlParams.get('id');

if(idKencleng){
    document.getElementById('kencleng').value = idKencleng;
}


// URL Apps Script
const scriptURL = "https://script.google.com/macros/s/AKfycbw_6eni4lZOUHhDisHWOjjnJsXsHKQ-aL55zVEPmWONPpEhsmiIaD3X9Na7HMkuGghEqg/exec";

async function ambilLokasi(){

    if(!navigator.geolocation){
        alert("Browser tidak mendukung GPS");
        return;
    }

    document.getElementById("alamat").value="Mengambil lokasi...";

    navigator.geolocation.getCurrentPosition(async function(pos){

        const lat=pos.coords.latitude;
        const lon=pos.coords.longitude;

        document.getElementById("latitude").value=lat;
        document.getElementById("longitude").value=lon;

        try{

            const url=`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`;

            const res=await fetch(url);

            const hasil=await res.json();

            const alamat=hasil.address;

            const desa=
            alamat.village ||
            alamat.hamlet ||
            alamat.suburb ||
            alamat.neighbourhood ||
            "-";

            const kecamatan=
            alamat.city_district ||
            alamat.suburb ||
            alamat.county ||
            "-";

            document.getElementById("alamat").value=
            "Desa "+desa+
            ", Kec. "+kecamatan;

        }catch(e){

            document.getElementById("alamat").value=
            "Lokasi berhasil diperoleh";

        }

    },function(){

        alert("Lokasi tidak diizinkan");

    });

}
// Kirim data ke Spreadsheet
document.getElementById("formKencleng").addEventListener("submit", function(e){

    e.preventDefault();

    const data = {
    kencleng: document.getElementById("kencleng").value,
    nama: document.getElementById("nama").value,
    wa: document.getElementById("wa").value,

    latitude: document.getElementById("latitude").value,
    longitude: document.getElementById("longitude").value,
    alamat: document.getElementById("alamat").value,

    device: navigator.platform,
    browser: navigator.userAgent
};
    

    fetch(scriptURL,{
        method:"POST",
        body:JSON.stringify(data)
    })
    .then(response => response.text())
    .then(result => {

        document.getElementById("pesan").innerHTML =
        "✅ Aktivasi berhasil. Terima kasih.";

        document.getElementById("formKencleng").reset();

    })
    .catch(error => {

        document.getElementById("pesan").innerHTML =
        "❌ Gagal mengirim data.";

    });

});

</script>

</body>
</html>
