<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktivasi Kencleng Koin Surga</title>
</head>
<body>
    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0ea5e9,#10b981);
}

.container{
    width:90%;
    max-width:450px;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.logo{
    text-align:center;
    font-size:60px;
    margin-bottom:10px;
}

h2{
    text-align:center;
    color:#0f172a;
    margin-bottom:5px;
}

.subjudul{
    text-align:center;
    color:#64748b;
    margin-bottom:25px;
    font-size:14px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
    color:#334155;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    margin-bottom:15px;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#10b981;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#10b981;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#059669;
}

.footer{
    text-align:center;
    margin-top:15px;
    font-size:12px;
    color:#64748b;
}

#pesan{
    text-align:center;
    margin-top:15px;
    font-weight:bold;
    color:green;
}
</style>

</head>

<body>

<div class="container">

    <div class="logo">🪙</div>

    <h2>Aktivasi Kencleng Koin Surga</h2>

    <p class="subjudul">
        Terima kasih telah menjadi bagian dari gerakan sedekah.
    </p>

    <form id="formKencleng">

        <label>Nomor Kencleng</label>
        <input type="text" id="kencleng" readonly>

        <label>Nama Lengkap</label>
        <input type="text" id="nama" placeholder="Masukkan nama lengkap" required>

        <label>Nomor WhatsApp</label>
        <input type="text" id="wa" placeholder="08xxxxxxxxxx" required>

        <button type="submit">
            Aktivasi Kencleng
        </button>

    </form>

    <div id="pesan"></div>

    <div class="footer">
        LAYANAN IZI POINT MAGETAN<br>
    <small>Memudahkan, Dimudahkan</small>
    </div>

</div>

<script>

// Ambil nomor kencleng dari QR
const urlParams = new URLSearchParams(window.location.search);
const idKencleng = urlParams.get('id');

if(idKencleng){
    document.getElementById('kencleng').value = idKencleng;
}

// Simulasi submit
document.getElementById('formKencleng')
.addEventListener('submit', function(e){

    e.preventDefault();

    document.getElementById('pesan').innerHTML =
    "✅ Aktivasi berhasil. Terima kasih.";

});

</script>
</body>
</html>
