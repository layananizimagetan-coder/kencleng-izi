<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard Admin</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f7fb;
}

.header{
    background:#009966;
    color:white;
    padding:20px;
    text-align:center;
}

.container{

    width:95%;
    margin:auto;
    margin-top:25px;

}

.cards{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;

}

.card{

background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
text-align:center;

}

.card h3{

margin:0;
font-size:18px;

}

.card h1{

font-size:42px;
color:#009966;

}

table{

width:100%;
margin-top:30px;
border-collapse:collapse;
background:white;

}

th{

background:#009966;
color:white;
padding:12px;

}

td{

padding:10px;
border-bottom:1px solid #ddd;

}

</style>

</head>

<body>

<div class="header">

<h1>DASHBOARD ADMIN</h1>

<p>IZI POINT MAGETAN</p>

</div>

<div class="container">

<div class="cards">

<div class="card">

<h3>Total Kencleng</h3>

<h1 id="total">0</h1>

</div>

<div class="card">

<h3>Sudah Aktif</h3>

<h1 id="aktif">0</h1>

</div>

<div class="card">

<h3>Belum Aktif</h3>

<h1 id="belum">0</h1>

</div>

</div>

<table>

<thead>

<tr>

<th>No Kencleng</th>

<th>Nama</th>

<th>WhatsApp</th>

<th>Status</th>

</tr>

</thead>

<tbody id="tabelData">

</tbody>

</table>

</div>

</body>
</html>
