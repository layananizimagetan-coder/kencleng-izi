<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Monitoring Kencleng</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f7fb;
}

/* HEADER */

.header{
    background:linear-gradient(90deg,#009966,#00b894);
    color:white;
    padding:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.header img{
    width:70px;
}

.header h1{
    font-size:28px;
}

.header p{
    font-size:15px;
}

/* CONTAINER */

.container{

    width:95%;
    max-width:1300px;
    margin:25px auto;

}

/* CARD */

.cards{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;

}

.card{

background:white;
padding:25px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,.1);
border-top:5px solid #009966;
transition:.3s;

}

.card:hover{

transform:translateY(-5px);

}

.card h3{

color:#666;
margin-bottom:10px;

}

.card h1{

font-size:42px;
color:#009966;

}

/* SEARCH */

.search{

background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
margin-bottom:25px;

}

.search input{

width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;

}

/* TABLE */

.table-box{

background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);

overflow:auto;

}

table{

width:100%;
border-collapse:collapse;

}

th{

background:#009966;
color:white;
padding:12px;

}

td{

padding:12px;
border-bottom:1px solid #eee;

}
.status-aktif{
    background:#d4edda;
    color:#155724;
    padding:6px 12px;
    border-radius:20px;
    font-weight:bold;
    display:inline-block;
}

.status-belum{
    background:#f8d7da;
    color:#721c24;
    padding:6px 12px;
    border-radius:20px;
    font-weight:bold;
    display:inline-block;
}

tr:hover{

background:#f5f5f5;

}

/* FOOTER */

.footer{

text-align:center;
padding:20px;
color:#666;
font-size:13px;

}

@media(max-width:700px){

.header{

flex-direction:column;

}

.header img{

width:60px;

}

.header h1{

font-size:22px;

}

}

</style>

</head>

<body>

<div class="header">

<img src="logo-yayasan.png">

<div>

<h1>DASHBOARD MONITORING</h1>

<p>IZI POINT MAGETAN</p>

</div>

<img src="logo-izi.png">

</div>

<div class="container">

<div class="cards">

<div class="card">

<h3>📦 Total Kencleng</h3>

<h1 id="total">0</h1>

</div>

<div class="card">

<h3>✅ Sudah Aktif</h3>

<h1 id="aktif">0</h1>

</div>

<div class="card">

<h3>⏳ Belum Aktif</h3>

<h1 id="belum">0</h1>

</div>

<div class="card">

<h3>📅 Aktivasi Hari Ini</h3>

<h1 id="hariini">0</h1>

</div>

</div>

<div class="search">

<input
type="text"
id="cari"
placeholder="🔍 Cari Nomor Kencleng / Nama Donatur">

</div>

<div class="table-box">

<table>

<thead>

<tr>

<th>No Kencleng</th>
<th>Nama</th>
<th>WhatsApp</th>
<th>Tanggal</th>
<th>Alamat</th>
<th>Status</th>

</tr>

</thead>

<tbody id="tabelData">

</tbody>

</table>

</div>

</div>

<div class="footer">

IZI POINT MAGETAN © 2026

</div>

<script>

const api="https://script.google.com/macros/s/AKfycbw_6eni4lZOUHhDisHWOjjnJsXsHKQ-aL55zVEPmWONPpEhsmiIaD3X9Na7HMkuGghEqg/exec";

fetch(api)
.then(res=>res.json())
.then(data=>{

document.getElementById("total").innerHTML=data.length;

let aktif = 0;
let hariIni = 0;

const today = new Date().toLocaleDateString('id-ID');

let html = "";

data.forEach(row=>{

    if(row[1]=="Aktif"){

        aktif++;

        if(row[4]){

            let tgl = new Date(row[4]).toLocaleDateString('id-ID');

            if(tgl==today){

                hariIni++;

            }

        }

    }

let badge = "";

if(row[1]=="Aktif"){

    badge = '<span class="status-aktif">🟢 Aktif</span>';

}else{

    badge = '<span class="status-belum">🔴 Belum Aktif</span>';

}

tbody.innerHTML += `
<tr>
<td>${row[0]}</td>
<td>${row[2]}</td>
<td>${row[3]}</td>
<td>${row[4]}</td>
<td>${row[9] || "-"}</td>
<td>${status}</td>
</tr>`;

});

document.getElementById("aktif").innerHTML = aktif;
document.getElementById("belum").innerHTML = data.length - aktif;
document.getElementById("hariini").innerHTML = hariIni;
document.getElementById("tabelData").innerHTML = html;

});

document.getElementById("cari").addEventListener("keyup",function(){

let filter=this.value.toUpperCase();

let tr=document.querySelectorAll("#tabelData tr");

tr.forEach(function(row){

let txt=row.innerText.toUpperCase();

row.style.display=txt.indexOf(filter)>-1?"":"none";

});

});

</script>

</body>
</html>
